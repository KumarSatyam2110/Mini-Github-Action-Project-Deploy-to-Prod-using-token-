name: Github Actions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  prod-deploy:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18, 20, 22]
        exclude:
          - os: windows-latest
            node-version: 22

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json')}}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test

      - name: Build
        run: npm build

      - name: Artifact Upload
        run: actions/upload-artifact@v4
        with:
          name: artifact-1
          path: |
            package*

      - name: Checkout
        run: actions/checkout@v6

      - name: Deploy
        run: echo "Deploy to production..."
        env:
          API_TOKEN: ${{ secrets.PROD_SERVER_TOKEN }}
            
          
          
      
          
